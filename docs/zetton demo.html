function TerminalLine({ text, delay, onComplete }) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);
  
  useEffect(() => {
    if (!text) return;
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        setDisplayed(text.slice(0, i + 1));
        i++;
      } else {
        clearInterval(interval);
        setDone(true);
        onComplete?.();
      }
    }, delay || 8);
    return () => clearInterval(interval);
  }, [text]);
  
  return <span>{displayed}{!done && <span style={{ animation: "blink 1s step-end infinite" }}>▌</span>}</span>;
}

function ModuleCard({ module, isActive, onClick }) {

          : hovered
            ? "linear-gradient(135deg, #1a1a1a 0%, #222 100%)"
            : "#111",
        border: isActive ? "1px solid #FFD700" : "1px solid #333",
        borderLeft: isActive ? "3px solid #FFD700" : "3px solid transparent",
        padding: "14px 16px",
        cursor: "pointer",
        transition: "all 0.2s ease",
        transform: hovered && !isActive ? "translateX(4px)" : "none",

        <span style={{ fontSize: 18 }}>{module.icon}</span>

            color: isActive ? "#FFD700" : "#ccc",
            fontSize: 13,
            fontWeight: 600,
            fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
            letterSpacing: "0.02em",
          }}>

            color: "#666",
            fontSize: 10,
            fontFamily: "'JetBrains Mono', monospace",
            marginTop: 2,
          }}>

        </div>
        <span style={{
          color: isActive ? "#FFD700" : "#444",

          transition: "transform 0.2s",

}

function Terminal({ content }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  
  useEffect(() => {
    setVisible(false);
    const t = setTimeout(() => setVisible(true), 50);
    return () => clearTimeout(t);
  }, [content]);
  
  useEffect(() => {
    if (ref.current) ref.current.scrollTop = 0;
  }, [content]);
  
  if (!visible) return null;
  
  return (
    <div
      ref={ref}
      style={{
        background: "#0a0a0a",
        border: "1px solid #333",
        borderRadius: 4,
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
        fontSize: 11.5,
        lineHeight: 1.6,
        overflow: "auto",
        maxHeight: 480,
        position: "relative",
      }}
    >
      <div style={{
        position: "sticky",
        top: 0,
        background: "linear-gradient(180deg, #1a1a1a 0%, #151515 100%)",
        borderBottom: "1px solid #333",
        padding: "8px 14px",
        display: "flex",
        alignItems: "center",
        gap: 8,
        zIndex: 2,
      }}>
        <div style={{ display: "flex", gap: 6 }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#ff5f57" }} />
          <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#febc2e" }} />
          <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#28c840" }} />
        </div>
        <span style={{ color: "#666", fontSize: 11, marginLeft: 8 }}>zetton — kali@cyberjedis</span>
      </div>
      <pre style={{
        margin: 0,
        padding: "16px 18px",
        color: "#c8c8c8",
        whiteSpace: "pre",
        overflowX: "auto",
      }}>
        {content.split('\n').map((line, i) => {
          let color = "#c8c8c8";
          if (line.includes("[✓]") || line.includes("✓") || line.includes("PASS")) color = "#28c840";
          else if (line.includes("[!]") || line.includes("⚠") || line.includes("WARNING") || line.includes("PARTIAL")) color = "#febc2e";
          else if (line.includes("[!!!]") || line.includes("CRITICAL") || line.includes("DANGEROUS") || line.includes("VULNERABILITY")) color = "#ff5f57";
          else if (line.includes("[⚛]") || line.includes("quantum") || line.includes("Quantum")) color = "#a78bfa";
          else if (line.includes("[*]")) color = "#60a5fa";
          else if (line.startsWith("$")) color = "#FFD700";
          else if (line.includes("╔") || line.includes("╚") || line.includes("║")) color = "#FFD700";
          
          return <div key={i} style={{ color, minHeight: "1.6em" }}>{line}</div>;
        })}
      </pre>
    </div>
  );
}
